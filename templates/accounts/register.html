{% extends 'base.html' %}
{% block title %}สมัครสมาชิก{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card p-4" style="width: 400px;">
        <div class="text-center mb-4">
            <i class="bi bi-graph-up-arrow" style="color: var(--neon-blue); font-size: 2.5rem;"></i>
            <h4 class="mt-2" style="color: var(--neon-blue);">สมัครสมาชิก</h4>
            <p class="text-muted">สร้างบัญชีใหม่</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-muted">ชื่อผู้ใช้</label>
                <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">อีเมล</label>
                <input type="email" name="email" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">รหัสผ่าน</label>
                <input type="password" name="password1" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">ยืนยันรหัสผ่าน</label>
                <input type="password" name="password2" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <button type="submit" class="btn w-100" style="background: var(--neon-blue); color: #000; font-weight: 600;">
                สมัครสมาชิก
            </button>
        </form>
        <p class="text-center mt-3 text-muted">
            มีบัญชีแล้ว? <a href="{% url 'accounts:login' %}" style="color: var(--neon-blue);">เข้าสู่ระบบ</a>
        </p>
    </div>
</div>
{% endblock %}
