{% extends 'base.html' %}
{% block title %}สร้างเป้าหมาย{% endblock %}
{% block page_title %}สร้างเป้าหมายการออม{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" style="color: #8892a4;">ชื่อเป้าหมาย</label>
                    <input type="text" name="goal_name" class="form-control bg-dark text-white border-secondary"
                        required placeholder="เช่น ซื้อโน้ตบุ๊ก, ท่องเที่ยวญี่ปุ่น">
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color: #8892a4;">จำนวนเงินเป้าหมาย (฿)</label>
                    <input type="number" name="target_amount" step="0.01" min="1"
                        class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color: #8892a4;">ยอดเงินปัจจุบัน (฿)</label>
                    <input type="number" name="current_amount" step="0.01" min="0" value="0"
                        class="form-control bg-dark text-white border-secondary">
                </div>
                <div class="mb-4">
                    <label class="form-label" style="color: #8892a4;">ครบกำหนด</label>
                    <input type="date" name="deadline"
                        class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn flex-fill" style="background: var(--neon-blue); color: #000; font-weight: 600;">
                        สร้างเป้าหมาย
                    </button>
                    <a href="{% url 'goals:list' %}" class="btn btn-outline-secondary flex-fill">ยกเลิก</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
