{% extends 'base.html' %}
{% block title %}แก้ไขรายการ{% endblock %}
{% block page_title %}แก้ไขรายการ{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-muted">ประเภท</label>
                    <select name="transaction_type" class="form-select bg-dark text-white border-secondary">
                        <option value="expense" {% if transaction.transaction_type == 'expense' %}selected{% endif %}>รายจ่าย</option>
                        <option value="income" {% if transaction.transaction_type == 'income' %}selected{% endif %}>รายรับ</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">จำนวนเงิน (฿)</label>
                    <input type="number" name="amount" step="0.01" value="{{ transaction.amount }}" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">หมวดหมู่</label>
                    <select name="category" class="form-select bg-dark text-white border-secondary">
                        <option value="">-- เลือกหมวดหมู่ --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.pk }}" {% if transaction.category.pk == cat.pk %}selected{% endif %}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">กระเป๋าเงิน</label>
                    <select name="wallet" class="form-select bg-dark text-white border-secondary">
                        <option value="">-- เลือกกระเป๋าเงิน --</option>
                        {% for w in wallets %}
                        <option value="{{ w.pk }}" {% if transaction.wallet.pk == w.pk %}selected{% endif %}>{{ w.wallet_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">วันที่</label>
                    <input type="date" name="date" value="{{ transaction.date }}" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">หมายเหตุ</label>
                    <input type="text" name="note" value="{{ transaction.note }}" class="form-control bg-dark text-white border-secondary">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">แท็ก</label>
                    <input type="text" name="tags" value="{{ transaction.tags }}" class="form-control bg-dark text-white border-secondary">
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" name="is_recurring" class="form-check-input" id="recurring" {% if transaction.is_recurring %}checked{% endif %}>
                    <label class="form-check-label text-muted" for="recurring">รายการประจำ</label>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn flex-fill" style="background: var(--neon-blue); color: #000; font-weight: 600;">บันทึก</button>
                    <a href="{% url 'transactions:list' %}" class="btn btn-outline-secondary flex-fill">ยกเลิก</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
