{% extends 'base.html' %}
{% block title %}ตั้งงบประมาณ{% endblock %}
{% block page_title %}ตั้งงบประมาณ{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-muted">หมวดหมู่รายจ่าย</label>
                    <select name="category" class="form-select bg-dark text-white border-secondary" required>
                        <option value="">-- เลือกหมวดหมู่ --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.pk }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">งบประมาณต่อเดือน (฿)</label>
                    <input type="number" name="limit_amount" step="0.01" min="0"
                        class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn flex-fill" style="background: var(--neon-blue); color: #000; font-weight: 600;">
                        บันทึก
                    </button>
                    <a href="{% url 'budgets:list' %}" class="btn btn-outline-secondary flex-fill">ยกเลิก</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
